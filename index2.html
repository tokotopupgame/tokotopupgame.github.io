    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:            #07111E;
            --surface:       #0C1A2C;
            --border:        #152234;
            --text-primary:  #EDF2F8;
            --text-muted:    #3E5168;
            --cyan:          #06B6D4;
            --purple:        #8B5CF6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 72px 20px 80px;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 44px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            margin-bottom: 22px;
            box-shadow: 0 0 32px rgba(6, 182, 212, 0.2);
        }

        .logo-wrap svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.02em;
        }

        /* ── Search ──────────────────────────────── */
        .search-wrap {
            width: 100%;
            max-width: 480px;
            position: relative;
            margin-bottom: 16px;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
        }

        .search-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-input:focus {
            border-color: rgba(6, 182, 212, 0.5);
        }

        /* ── Count ───────────────────────────────── */
        .count-label {
            width: 100%;
            max-width: 480px;
            text-align: right;
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            min-height: 1em;
            letter-spacing: 0.03em;
        }

        /* ── List ────────────────────────────────── */
        .list {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .item {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeUp 0.28s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .item a {
            display: flex;
            align-items: center;
            gap: 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 0.925rem;
            transition: border-color 0.2s, transform 0.15s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .item a::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                rgba(6, 182, 212, 0.04),
                rgba(139, 92, 246, 0.04));
            opacity: 0;
            transition: opacity 0.2s;
        }

        .item a:hover {
            border-color: rgba(6, 182, 212, 0.35);
            background: #0F1F34;
            transform: translateX(4px);
        }

        .item a:hover::after { opacity: 1; }

        /* Avatar badge */
        .badge {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
            letter-spacing: 0;
            position: relative;
            z-index: 1;
        }

        .platform-name {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .arrow {
            color: var(--text-muted);
            flex-shrink: 0;
            transition: color 0.2s, transform 0.2s;
            position: relative;
            z-index: 1;
        }

        .item a:hover .arrow {
            color: var(--cyan);
            transform: translateX(3px);
        }

        /* ── Empty state ─────────────────────────── */
        .empty {
            display: none;
            padding: 36px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ── Divider ─────────────────────────────── */
        .divider {
            width: 100%;
            max-width: 480px;
            height: 1px;
            background: var(--border);
            margin: 40px 0 24px;
        }

        /* ── Footer ──────────────────────────────── */
        .footer {
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.03em;
            text-align: center;
        }

        /* ── Responsive ──────────────────────────── */
        @media (max-width: 520px) {
            body { padding: 52px 16px 64px; }
            h1   { font-size: 1.65rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .item { animation: none; opacity: 1; transform: none; }
            .item a, .arrow { transition: none; }
        }
    </style>
</head>
<body>

    <div class="header">

                         s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2-3c-.55 0-1-.45-1-1
                         s.45-1 1-1 1 .45 1 1-.45 1-1 1zm0 4c-.55 0-1-.45-1-1
                         s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2-2c-.55 0-1-.45-1-1
                         s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
            </svg>
        </div>
        <h1>Toko Topup Game</h1>
        <p class="subtitle">Kumpulan website top-up game terpercaya</p>
    </div>

    <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </span>
        <input class="search-input" type="search" id="searchInput"
               placeholder="Cari platform…" autocomplete="off">
    </div>

    <p class="count-label" id="countLabel" aria-live="polite"></p>
    <div class="list" id="siteList" role="list"></div>
    <p class="empty" id="emptyState">Tidak ada platform yang ditemukan.</p>

    <div class="divider"></div>
    <footer class="footer">&copy; 2025 Toko Topup Game</footer>

    <script>
        const sites = [
            { name: "Codashop",     link: "https://codashop.com",      color: "#F97316" },
            { name: "UniPin",       link: "https://unipin.com",         color: "#3B82F6" },
            { name: "Itemku",       link: "https://itemku.com",         color: "#10B981" },
            { name: "Dunia Games",  link: "https://duniagames.co.id",   color: "#8B5CF6" },
            { name: "VCGamers",     link: "https://s.vcgamers.com/D96kX_Oz1kP7O_H", color: "#EF4444" },
            { name: "Buylink",      link: "https://buylink.id/zany",    color: "#F59E0B" },
            { name: "GameSquad",    link: "https://zany.gamesquad.id/", color: "#06B6D4" },
            { name: "Grosir Topup", link: "https://zany.grosirtopup.com/", color: "#EC4899" },
            { name: "Topup Disini", link: "https://www.topupdisini.id/zanytopup", color: "#6366F1" },
            { name: "LapakGaming",  link: "https://www.lapakgaming.com?utm_campaign=tokotopupgame&utm_source=Affiliate&utm_medium=LGA", color: "#14B8A6" },
        ];

        const listEl    = document.getElementById('siteList');
        const searchEl  = document.getElementById('searchInput');
        const emptyEl   = document.getElementById('emptyState');
        const countEl   = document.getElementById('countLabel');

        const arrowSVG = `<svg class="arrow" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
        </svg>`;

        function initials(name) {
            return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
        }

        function render(list) {
            listEl.innerHTML = '';
            list.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.setAttribute('role', 'listitem');
                div.style.animationDelay = `${i * 35}ms`;
                div.innerHTML = `
                    <a href="${s.link}" target="_blank" rel="noopener noreferrer">
                        <div class="badge" style="background:${s.color}">${initials(s.name)}</div>
                        <span class="platform-name">${s.name}</span>
                        ${arrowSVG}
                    </a>`;
                listEl.appendChild(div);
            });

            const none = list.length === 0;
            emptyEl.style.display  = none ? 'block' : 'none';
            countEl.textContent    = none ? '' : `${list.length} platform tersedia`;
        }

        render(sites);

        searchEl.addEventListener('input', () => {
            const q = searchEl.value.toLowerCase().trim();
            render(q ? sites.filter(s => s.name.toLowerCase().includes(q)) : sites);
        });
    </script>
