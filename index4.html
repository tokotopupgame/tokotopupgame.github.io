<body>

    <h1>Toko Topup Game</h1>
    <p class="subtitle">List Website Topup Game Terpercaya</p>

    <div class="search-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Cari website topup..." autocomplete="off">
    </div>

    <div class="list" id="siteList"></div>

    <script>
        let allSites = [];

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            // Skip header row (name,link)
            return lines.slice(1).map(line => {
                // Split only on the FIRST comma to handle URLs with commas
                const commaIndex = line.indexOf(',');
                if (commaIndex === -1) return null;
                const name = line.slice(0, commaIndex).trim();
                const link = line.slice(commaIndex + 1).trim();
                return (name && link) ? { name, link } : null;
            }).filter(Boolean);
        }

        function getFaviconUrl(link) {
            try {
                const domain = new URL(link).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
            } catch (e) {
                return '';
            }
        }

        function getDomain(link) {
            try {
                return new URL(link).hostname.replace('www.', '');
            } catch (e) {
                return link;
            }
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightMatch(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function filterSites(query) {
            const q = query.trim().toLowerCase();
            if (!q) return allSites;
            return allSites.filter(site =>
                site.name.toLowerCase().includes(q) ||
                getDomain(site.link).toLowerCase().includes(q)
            );
        }

        function renderList(sites, query = '') {
            const list = document.getElementById('siteList');
            if (sites.length === 0) {
                list.innerHTML = `<p class="no-result">Tidak ada hasil untuk "${query}" 😕</p>`;
                return;
            }
            list.innerHTML = sites.map(site => {
                const iconUrl = getFaviconUrl(site.link);
                const nameHighlighted = highlightMatch(site.name, query.trim());
                return `
                    <div class="item">
                        <a href="${site.link}" target="_blank" rel="noopener">
                            <img class="item-icon" src="${iconUrl}" alt="${site.name} icon" loading="lazy" onerror="this.style.visibility='hidden'">
                            <span class="item-name">${nameHighlighted}</span>
                            <span class="arrow">→</span>
                        </a>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value;
            const filtered = filterSites(query);
            renderList(filtered, query);
        });

        fetch('data.csv')
            .then(res => {
                if (!res.ok) throw new Error(`Gagal memuat data.csv (${res.status})`);
                return res.text();
            })
            .then(text => {
                allSites = parseCSV(text);
                renderList(allSites);
            })
            .catch(err => {
                document.getElementById('siteList').innerHTML =
                    `<p class="error">⚠️ ${err.message}</p>`;
                console.error(err);
            });
    </script>

</body>
