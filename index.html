<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Topup Game | List Website Topup Game Terpercaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 48px;
            font-size: 0.95rem;
        }

        .list {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 18px 24px;
            color: #f1f5f9;
            text-decoration: none;
            font-weight: 600;
            transition: border-color 0.2s, background 0.2s;
        }

        .item a:hover {
            background: #253347;
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .item a span.arrow {
            color: #38bdf8;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>Toko Topup Game</h1>
    <p class="subtitle">List Website Topup Game Terpercaya</p>

    <div class="list" id="siteList"></div>

    <script>
        const sites = [
            { name: "Codashop",     link: "https://codashop.com" },
            { name: "UniPin",       link: "https://unipin.com" },
            { name: "Itemku",       link: "https://itemku.com" },
            { name: "Dunia Games",  link: "https://duniagames.co.id" },
            { name: "VCGamers",     link: "https://vcgamers.com" },
            
        ];

        const list = document.getElementById('siteList');
        sites.forEach(site => {
            list.innerHTML += `
                <div class="item">
                    <a href="${site.link}" target="_blank" rel="noopener">
                        ${site.name}
                        <span class="arrow">→</span>
                    </a>
                </div>
            `;
        });
    </script>

</body>
</html>
