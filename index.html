<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurasi Top-Up Game Termurah</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: white; }
        .table-container { background: #16213e; padding: 20px; border-radius: 10px; margin-top: 30px; }
        .table { color: white; }
        .btn-visit { background-color: #e94560; color: white; border: none; }
        .btn-visit:hover { background-color: #0f3460; color: white; }
        .promo-code { font-family: monospace; background: #0f3460; padding: 2px 5px; border: 1px dashed #e94560; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mt-5">🎮 Kurasi Top-Up Game</h2>
    <p class="text-center text-muted">Bandingkan harga dan temukan promo terbaik</p>

    <!-- Filter Pencarian -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control" placeholder="Cari nama game atau website...">
        </div>
    </div>

    <div class="table-container shadow">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Game</th>
                        <th>Produk</th>
                        <th>Harga</th>
                        <th>Kode Promo</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="topupTable">
                    <!-- Data akan muncul di sini via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Data contoh (Bisa kamu tambah sendiri)
    const dataTopUp = [
        { name: "Codashop", game: "Mobile Legends", product: "86 Diamonds", price: "Rp 20.000", promo: "CODA5K", link: "https://codashop.com" },
        { name: "UniPin", game: "Free Fire", product: "140 Diamonds", price: "Rp 19.500", promo: "UNIPINBARU", link: "https://unipin.com" },
        { name: "Itemku", game: "Mobile Legends", product: "86 Diamonds", price: "Rp 18.900", promo: "-", link: "https://itemku.com" },
        { name: "Dunia Games", game: "Genshin Impact", product: "60 Genesis Crystal", price: "Rp 15.000", promo: "DGCHEAP", link: "https://duniagames.co.id" },
    ];

    function renderTable(data) {
        const tableBody = document.getElementById('topupTable');
        tableBody.innerHTML = "";
        
        data.forEach(item => {
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.game}</td>
                    <td>${item.product}</td>
                    <td class="text-warning fw-bold">${item.price}</td>
                    <td><span class="promo-code">${item.promo}</span></td>
                    <td><a href="${item.link}" target="_blank" class="btn btn-sm btn-visit">Cek Web</a></td>
                </tr>
            `;
        });
    }

    // Fungsi Pencarian
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const value = this.value.toLowerCase();
        const filteredData = dataTopUp.filter(item => 
            item.name.toLowerCase().includes(value) || 
            item.game.toLowerCase().includes(value)
        );
        renderTable(filteredData);
    });

    // Inisialisasi awal
    renderTable(dataTopUp);
</script>

</body>
</html>
