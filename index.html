<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameLink - Direktori Top-Up Game Terpercaya</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0a0f1c;
            --bg-card: #151d2f;
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
        }

        .header-section {
            padding: 60px 0 40px;
            text-align: center;
            background: radial-gradient(circle at top, #1e293b 0%, #0a0f1c 100%);
        }

        .brand-name {
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .search-container {
            max-width: 600px;
            margin: -30px auto 40px;
            padding: 0 20px;
        }

        .search-input {
            background: var(--bg-card);
            border: 1px solid #2d3748;
            border-radius: 15px;
            padding: 15px 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .search-input:focus {
            background: var(--bg-card);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* Card Styling */
        .web-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            height: 100%;
            border: 1px solid #2d3748;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .web-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .web-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .web-name {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 5px;
        }

        .web-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .btn-visit {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .btn-visit:hover {
            opacity: 0.9;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        .badge-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 50px;
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container">
        <h1 class="brand-name">GameLink</h1>
        <p class="text-muted">Kumpulan Website Top-Up Game Terpercaya & Legal</p>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="form-control search-input" placeholder="Cari nama website top-up...">
</div>

<div class="container mb-5">
    <div class="row g-4" id="webList">
        <!-- Data akan muncul di sini -->
    </div>
</div>

<footer class="text-center py-4 text-muted">
    <small>&copy; 2023 GameLink Directory. All Rights Reserved.</small>
</footer>

<script>
    // DATA WEBSITE (Tinggal tambah di sini)
    const websites = [
        { name: "Codashop", desc: "Instan, tanpa registrasi, provider terbesar.", link: "https://www.codashop.com" },
        { name: "UniPin", desc: "Banyak pilihan game dan metode pembayaran.", link: "https://www.unipin.com" },
        { name: "Dunia Games", desc: "Sering ada promo kuota dari Telkomsel.", link: "https://duniagames.co.id" },
        { name: "Itemku", desc: "Marketplace gaming terbesar di Indonesia.", link: "https://itemku.com" },
        { name: "VCGamers", desc: "Marketplace aman untuk item dan top-up.", link: "https://vcgamers.com" },
        { name: "Bang Alex Store", desc: "Top-up influencer amanah dan murah.", link: "#" },
        { name: "Lapakkami", desc: "Pilihan favorit untuk top-up game mobile.", link: "https://lapakkami.com" },
        { name: "Mocipay", desc: "Aplikasi top-up murah dengan layanan cepat.", link: "https://mocipay.com" },
    ];

    function displayWebsites(data) {
        const container = document.getElementById('webList');
        container.innerHTML = '';

        data.forEach(web => {
            container.innerHTML += `
                <div class="col-md-6 col-lg-4 col-xl-3">
                    <div class="web-card">
                        <div>
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="web-icon"><i class="fas fa-globe"></i></div>
                                <span class="badge-status">Verified</span>
                            </div>
                            <h3 class="web-name">${web.name}</h3>
                            <p class="web-desc">${web.desc}</p>
                        </div>
                        <a href="${web.link}" target="_blank" class="btn-visit">
                            Kunjungi Situs <i class="fas fa-external-link-alt ms-2"></i>
                        </a>
                    </div>
                </div>
            `;
        });
    }

    // Fungsi Pencarian
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase();
        const filtered = websites.filter(web => web.name.toLowerCase().includes(keyword));
        displayWebsites(filtered);
    });

    // Jalankan saat pertama buka
    displayWebsites(websites);
</script>

</body>
</html>
